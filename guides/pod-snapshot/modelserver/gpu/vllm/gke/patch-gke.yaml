apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  template:
    spec:
      runtimeClassName: gvisor
      containers:
        - name: modelserver
          command: ["/bin/sh", "-c"]
          args:
            - |
              (while true; do curl -s -f http://localhost:8000/health && echo "Model server is ready. Triggering checkpoint..." && echo 1 > /proc/gvisor/checkpoint && break; sleep 1; done) &
              exec python3 -m vllm.entrypoints.openai.api_server --model=meta-llama/Llama-3.1-8B-Instruct --gpu-memory-utilization=0.90 --max-model-len=8192
